name: Test GCP Auth (WIF)
on:
  workflow_dispatch:

jobs:
  reproduce-bug:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          token_format: "id_token"
          id_token_audience: "akeyless.io"
          id_token_include_email: true
          workload_identity_provider: "projects/717477426588/locations/global/workloadIdentityPools/akeyless-gh-action-test/providers/github-oidc"
          service_account: "aviv-gh-action-test@akeyless-test-env.iam.gserviceaccount.com"

      - name: Akeyless login - published action without fix (should FAIL)
        uses: akeyless-community/akeyless-github-action@main
        with:
          api-url: "https://api.staging.akeyless.dev"
          access-id: "p-cs4hofdili60gm"
          access-type: gcp
          gcp-audience: "akeyless.io"
          static-secrets: |
            - name: "gcp-wif-test-secret"
              output-name: "my_secret"

  test-fix:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          token_format: "id_token"
          id_token_audience: "akeyless.io"
          id_token_include_email: true
          workload_identity_provider: "projects/717477426588/locations/global/workloadIdentityPools/akeyless-gh-action-test/providers/github-oidc"
          service_account: "aviv-gh-action-test@akeyless-test-env.iam.gserviceaccount.com"

      - name: Debug - manual Akeyless auth test
        run: |
          echo "Testing manual auth to Akeyless..."
          TOKEN="${{ steps.gcp-auth.outputs.id_token }}"
          CLOUD_ID=$(echo -n "$TOKEN" | base64 -w 0)
          RESPONSE=$(curl -s -X POST "https://api.staging.akeyless.dev/auth" \
            -H "Content-Type: application/json" \
            -d "{\"access-type\": \"gcp\", \"access-id\": \"p-cs4hofdili60gm\", \"cloud-id\": \"$CLOUD_ID\", \"gcp-audience\": \"akeyless.io\"}")
          echo "Akeyless response: $RESPONSE"

      - name: Akeyless login - local action with fix (should PASS)
        uses: ./
        with:
          api-url: "https://api.staging.akeyless.dev"
          access-id: "p-cs4hofdili60gm"
          access-type: gcp
          gcp-audience: "akeyless.io"
          gcp-id-token: ${{ steps.gcp-auth.outputs.id_token }}
          static-secrets: |
            - name: "gcp-wif-test-secret"
              output-name: "my_secret"

      - name: Verify secret was fetched
        run: echo "GCP WIF auth with gcp-id-token worked!"
